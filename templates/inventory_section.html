{% if not is_full_page %}
<div id="user-nav-container" hx-swap-oob="true">
  <div class="user-nav" x-data>
    <div class="portfolio-stats" style="display: flex; gap: 16px; margin-right: 20px; text-align: right; font-size: 0.875rem;">
      <div style="display: flex; flex-direction: column; justify-content: center;">
        <span style="color: var(--text-secondary); text-transform: uppercase; font-size: 0.70rem; line-height: 1;">Total dépensé</span>
        <div style="font-weight: 600;" x-text="$store.portfolio.totalSpent.toFixed(2) + ' €'">0.00 €</div>
      </div>
      <div style="display: flex; flex-direction: column; justify-content: center;">
        <span style="color: var(--text-secondary); text-transform: uppercase; font-size: 0.70rem; line-height: 1;">Bénéfice</span>
        <div style="font-weight: 600;" :class="$store.portfolio.totalProfit >= 0 ? 'text-success' : 'text-danger'" x-text="($store.portfolio.totalProfit >= 0 ? '+ ' : '') + $store.portfolio.totalProfit.toFixed(2) + ' €'">0.00 €</div>
      </div>
    </div>
    <div class="user-info">
      <img
        src="{{ avatar if avatar else 'https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg' }}"
        alt="Avatar"
        class="avatar"
      />
      <span>{{ pseudo }}</span>
    </div>
    <button hx-post="/logout" hx-target="body" class="btn btn-danger">
      Déconnexion
    </button>
  </div>
</div>
{% endif %}

<main id="main-content" x-data="{ currentFilter: 'tous' }">
  <nav class="filters">
    <button
      @click="currentFilter = 'tous'"
      :class="currentFilter === 'tous' ? 'filter-btn active' : 'filter-btn'"
    >
      Tous
    </button>
    <button
      @click="currentFilter = 'armes'"
      :class="currentFilter === 'armes' ? 'filter-btn active' : 'filter-btn'"
    >
      Armes
    </button>
    <button
      @click="currentFilter = 'gants'"
      :class="currentFilter === 'gants' ? 'filter-btn active' : 'filter-btn'"
    >
      Gants
    </button>
    <button
      @click="currentFilter = 'agents'"
      :class="currentFilter === 'agents' ? 'filter-btn active' : 'filter-btn'"
    >
      Agents
    </button>
    <button
      @click="currentFilter = 'caisses'"
      :class="currentFilter === 'caisses' ? 'filter-btn active' : 'filter-btn'"
    >
      Caisses
    </button>
    <button
      @click="currentFilter = 'stickers'"
      :class="currentFilter === 'stickers' ? 'filter-btn active' : 'filter-btn'"
    >
      Stickers
    </button>
    <button
      @click="currentFilter = 'porte-cles'"
      :class="currentFilter === 'porte-cles' ? 'filter-btn active' : 'filter-btn'"
    >
      Porte-clés
    </button>
    <button
      @click="currentFilter = 'ecussons'"
      :class="currentFilter === 'ecussons' ? 'filter-btn active' : 'filter-btn'"
    >
      Écussons
    </button>
    <button
      @click="currentFilter = 'pins'"
      :class="currentFilter === 'pins' ? 'filter-btn active' : 'filter-btn'"
    >
      Pins
    </button>
    <button
      @click="currentFilter = 'kits_musique'"
      :class="currentFilter === 'kits_musique' ? 'filter-btn active' : 'filter-btn'"
    >
      Kits de musique
    </button>
  </nav>

  <div
    class="grid"
    hx-get="/inventory"
    hx-trigger="load"
    id="inventory-container"
  >
    <div
      class="card"
      style="
        text-align: center;
        padding: 40px;
        grid-column: 1 / -1;
        border: none;
        background: transparent;
      "
    >
      <p style="color: var(--text-secondary); font-size: 1.125rem">
        Chargement de l'inventaire...
      </p>
    </div>
  </div>
</main>
